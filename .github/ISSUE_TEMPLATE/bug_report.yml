name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting a bug, confirm it's not a known limitation (offline mode, POSIX compatibility, etc.).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start os-agent with config ...
        2. Type '...' at aios> prompt
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Ubuntu 24.04
        - Rust: 1.78
        - LLM API: DeepSeek / Claude / other
        - Hardware: x86_64 / ARM64
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
